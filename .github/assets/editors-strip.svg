<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 120" fill="none" role="img" aria-label="Works with Claude Code, Cursor, VS Code, Codex, Gemini, Windsurf, and Continue">
  <style>
    .chip { fill: #0b0b0f; stroke: #f59e0b; stroke-opacity: 0.4; stroke-width: 1.2; }
    .lbl { font-family: 'SF Pro Display', system-ui, sans-serif; font-size: 13px; font-weight: 600; fill: #f3f4f6; }
    .sub { font-family: Menlo, monospace; font-size: 10px; fill: #6b7280; letter-spacing: 0.5px; }
    .dot { fill: #f59e0b; }
    @keyframes chip-hover {
      0%, 100% { transform: translateY(0); filter: drop-shadow(0 0 0 rgba(245,158,11,0)); }
      50% { transform: translateY(-3px); filter: drop-shadow(0 4px 12px rgba(245,158,11,0.4)); }
    }
    .c1 { animation: chip-hover 4s ease-in-out infinite; transform-origin: center; transform-box: fill-box; }
    .c2 { animation: chip-hover 4s ease-in-out infinite 0.4s; transform-origin: center; transform-box: fill-box; }
    .c3 { animation: chip-hover 4s ease-in-out infinite 0.8s; transform-origin: center; transform-box: fill-box; }
    .c4 { animation: chip-hover 4s ease-in-out infinite 1.2s; transform-origin: center; transform-box: fill-box; }
    .c5 { animation: chip-hover 4s ease-in-out infinite 1.6s; transform-origin: center; transform-box: fill-box; }
    .c6 { animation: chip-hover 4s ease-in-out infinite 2.0s; transform-origin: center; transform-box: fill-box; }
    .c7 { animation: chip-hover 4s ease-in-out infinite 2.4s; transform-origin: center; transform-box: fill-box; }
    @keyframes line-sweep {
      0% { stroke-dashoffset: 200; opacity: 0.2; }
      50% { stroke-dashoffset: 0; opacity: 0.8; }
      100% { stroke-dashoffset: -200; opacity: 0.2; }
    }
    .sweep { stroke: #f59e0b; stroke-width: 1.5; stroke-dasharray: 4 8; animation: line-sweep 6s linear infinite; fill: none; opacity: 0.5; }
  </style>

  <text x="600" y="22" text-anchor="middle" class="sub">WORKS AS A STANDALONE MCP SERVER IN</text>

  <line class="sweep" x1="30" y1="70" x2="1170" y2="70"/>

  <g class="c1" transform="translate(60,50)">
    <rect x="0" y="0" width="140" height="44" rx="10" class="chip"/>
    <circle cx="20" cy="22" r="4" class="dot"/>
    <text x="34" y="27" class="lbl">Claude Code</text>
  </g>
  <g class="c2" transform="translate(220,50)">
    <rect x="0" y="0" width="100" height="44" rx="10" class="chip"/>
    <circle cx="20" cy="22" r="4" class="dot"/>
    <text x="34" y="27" class="lbl">Cursor</text>
  </g>
  <g class="c3" transform="translate(340,50)">
    <rect x="0" y="0" width="110" height="44" rx="10" class="chip"/>
    <circle cx="20" cy="22" r="4" class="dot"/>
    <text x="34" y="27" class="lbl">VS Code</text>
  </g>
  <g class="c4" transform="translate(470,50)">
    <rect x="0" y="0" width="100" height="44" rx="10" class="chip"/>
    <circle cx="20" cy="22" r="4" class="dot"/>
    <text x="34" y="27" class="lbl">Codex</text>
  </g>
  <g class="c5" transform="translate(590,50)">
    <rect x="0" y="0" width="108" height="44" rx="10" class="chip"/>
    <circle cx="20" cy="22" r="4" class="dot"/>
    <text x="34" y="27" class="lbl">Gemini</text>
  </g>
  <g class="c6" transform="translate(718,50)">
    <rect x="0" y="0" width="118" height="44" rx="10" class="chip"/>
    <circle cx="20" cy="22" r="4" class="dot"/>
    <text x="34" y="27" class="lbl">Windsurf</text>
  </g>
  <g class="c7" transform="translate(856,50)">
    <rect x="0" y="0" width="126" height="44" rx="10" class="chip"/>
    <circle cx="20" cy="22" r="4" class="dot"/>
    <text x="34" y="27" class="lbl">Continue</text>
  </g>
  <g class="c1" transform="translate(1002,50)">
    <rect x="0" y="0" width="140" height="44" rx="10" class="chip" stroke-dasharray="3 3"/>
    <text x="70" y="27" text-anchor="middle" font-family="Menlo,monospace" font-size="11" fill="#f59e0b" font-weight="600">+ any mcp client</text>
  </g>
</svg>
