<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fde047"/>
      <stop offset="100%" stop-color="#facc15"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="#0a0a0a"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="10" height="640" fill="url(#accent)"/>

  <!-- Soft glow -->
  <circle cx="1120" cy="140" r="240" fill="#fde047" opacity="0.08"/>

  <!-- Wordmark "10x" -->
  <text x="120" y="310"
        font-family="Inter, system-ui, -apple-system, sans-serif"
        font-size="260" font-weight="900"
        fill="url(#accent)"
        letter-spacing="-8">10x</text>

  <!-- Tagline -->
  <text x="120" y="400"
        font-family="Inter, system-ui, -apple-system, sans-serif"
        font-size="38" font-weight="700"
        fill="#ffffff">Claude Code plugins that ship quality.</text>

  <!-- Sub-tagline -->
  <text x="120" y="452"
        font-family="Inter, system-ui, -apple-system, sans-serif"
        font-size="26" font-weight="400"
        fill="#a1a1aa">Curated marketplace. One-command install. sniff, ui-ux-suite, and more.</text>

  <!-- Install command pill -->
  <g transform="translate(120, 510)">
    <rect x="0" y="0" width="570" height="54" rx="27" fill="#fde047"/>
    <text x="285" y="36"
          font-family="JetBrains Mono, Menlo, monospace"
          font-size="22" font-weight="700"
          fill="#0a0a0a" text-anchor="middle">claude plugin marketplace add Aboudjem/10x</text>
  </g>

  <!-- Repo URL -->
  <text x="1160" y="600"
        font-family="JetBrains Mono, Menlo, monospace"
        font-size="20"
        fill="#71717a" text-anchor="end">github.com/Aboudjem/10x</text>
</svg>
