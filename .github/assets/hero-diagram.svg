<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" fill="none" role="img" aria-label="10x marketplace flow: your editor connects to the 10x hub which ships plugins like sniff and ui-ux-suite">
  <style>
    .bg-grid { stroke: #f59e0b; stroke-width: 1; opacity: 0.05; }
    .node-stroke { stroke: #f59e0b; stroke-width: 1.5; }
    .node-bg { fill: #0b0b0f; }
    .node-bg-light { fill: #ffffff; }
    .label { font-family: ui-monospace, 'SF Mono', Menlo, monospace; font-size: 13px; font-weight: 600; fill: #f59e0b; }
    .sub { font-family: ui-monospace, 'SF Mono', Menlo, monospace; font-size: 10px; fill: #9ca3af; letter-spacing: 0.5px; }
    .title { font-family: 'SF Pro Display', -apple-system, system-ui, sans-serif; font-size: 16px; font-weight: 700; fill: #f3f4f6; }
    .chip { font-family: ui-monospace, Menlo, monospace; font-size: 10px; fill: #f59e0b; font-weight: 600; }
    .hub-ring { fill: none; stroke: #f59e0b; stroke-width: 2; stroke-dasharray: 4 6; transform-origin: 600px 210px; animation: ring-spin 24s linear infinite; }
    .hub-ring-2 { fill: none; stroke: #f59e0b; stroke-width: 1; stroke-dasharray: 2 4; opacity: 0.4; transform-origin: 600px 210px; animation: ring-spin-rev 18s linear infinite; }
    .flow-path { stroke: #f59e0b; stroke-width: 1.5; opacity: 0.35; fill: none; stroke-dasharray: 3 4; }
    .pulse { animation: pulse 2.5s ease-in-out infinite; }
    .pulse-2 { animation: pulse 2.5s ease-in-out infinite 0.4s; }
    .pulse-3 { animation: pulse 2.5s ease-in-out infinite 0.8s; }
    @keyframes ring-spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes ring-spin-rev { from { transform: rotate(360deg); } to { transform: rotate(0deg); } }
    @keyframes pulse {
      0%, 100% { opacity: 0.9; }
      50% { opacity: 0.5; }
    }
    @keyframes hub-glow {
      0%, 100% { filter: drop-shadow(0 0 12px rgba(245,158,11,0.4)); }
      50% { filter: drop-shadow(0 0 24px rgba(245,158,11,0.8)); }
    }
    .hub-core { animation: hub-glow 3s ease-in-out infinite; transform-origin: 600px 210px; }
    @keyframes node-glow {
      0%, 100% { filter: drop-shadow(0 0 6px rgba(245,158,11,0.2)); }
      50% { filter: drop-shadow(0 0 12px rgba(245,158,11,0.5)); }
    }
    .node-card { animation: node-glow 4s ease-in-out infinite; }
    @media (prefers-color-scheme: light) {
      .node-bg { fill: #ffffff; }
      .title { fill: #111827; }
      .sub { fill: #6b7280; }
      .bg-grid { opacity: 0.08; }
    }
  </style>

  <defs>
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" class="bg-grid"/>
    </pattern>
    <radialGradient id="hub-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.25"/>
      <stop offset="60%" stop-color="#f59e0b" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="flow-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0"/>
      <stop offset="50%" stop-color="#f59e0b" stop-opacity="1"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="420" fill="url(#grid)"/>
  <circle cx="600" cy="210" r="200" fill="url(#hub-grad)"/>

  <!-- LEFT: Your editor -->
  <g class="node-card">
    <rect x="60" y="130" width="220" height="160" rx="14" class="node-bg node-stroke"/>
    <text x="80" y="160" class="sub">01 · YOUR WORKFLOW</text>
    <text x="80" y="188" class="title">Your editor</text>
    <g transform="translate(80,212)">
      <!-- editor chips -->
      <g>
        <rect x="0" y="0" width="70" height="24" rx="6" fill="none" stroke="#f59e0b" stroke-opacity="0.4"/>
        <text x="35" y="16" text-anchor="middle" class="chip">claude</text>
      </g>
      <g transform="translate(78,0)">
        <rect x="0" y="0" width="60" height="24" rx="6" fill="none" stroke="#f59e0b" stroke-opacity="0.4"/>
        <text x="30" y="16" text-anchor="middle" class="chip">cursor</text>
      </g>
      <g transform="translate(146,0)">
        <rect x="0" y="0" width="48" height="24" rx="6" fill="none" stroke="#f59e0b" stroke-opacity="0.4"/>
        <text x="24" y="16" text-anchor="middle" class="chip">vscode</text>
      </g>
      <g transform="translate(0,32)">
        <rect x="0" y="0" width="56" height="24" rx="6" fill="none" stroke="#f59e0b" stroke-opacity="0.4"/>
        <text x="28" y="16" text-anchor="middle" class="chip">codex</text>
      </g>
      <g transform="translate(64,32)">
        <rect x="0" y="0" width="70" height="24" rx="6" fill="none" stroke="#f59e0b" stroke-opacity="0.4"/>
        <text x="35" y="16" text-anchor="middle" class="chip">windsurf</text>
      </g>
      <g transform="translate(142,32)">
        <rect x="0" y="0" width="52" height="24" rx="6" fill="none" stroke="#f59e0b" stroke-opacity="0.4"/>
        <text x="26" y="16" text-anchor="middle" class="chip">gemini</text>
      </g>
    </g>
  </g>

  <!-- flow path: editor -> hub -->
  <path id="flow-left" d="M 280 210 L 520 210" class="flow-path"/>
  <circle r="4" fill="#f59e0b">
    <animateMotion dur="2.2s" repeatCount="indefinite" path="M 280 210 L 520 210"/>
  </circle>
  <circle r="3" fill="#f59e0b" opacity="0.6">
    <animateMotion dur="2.2s" begin="0.7s" repeatCount="indefinite" path="M 280 210 L 520 210"/>
  </circle>
  <circle r="2" fill="#f59e0b" opacity="0.4">
    <animateMotion dur="2.2s" begin="1.4s" repeatCount="indefinite" path="M 280 210 L 520 210"/>
  </circle>

  <!-- HUB: 10x marketplace -->
  <g>
    <circle cx="600" cy="210" r="110" class="hub-ring"/>
    <circle cx="600" cy="210" r="130" class="hub-ring-2"/>
    <g class="hub-core">
      <circle cx="600" cy="210" r="72" fill="#0b0b0f" stroke="#f59e0b" stroke-width="2"/>
      <text x="600" y="206" text-anchor="middle" font-family="'SF Pro Display', system-ui, sans-serif" font-weight="800" font-size="38" fill="#f59e0b">10x</text>
      <text x="600" y="228" text-anchor="middle" class="sub">MARKETPLACE</text>
    </g>
    <!-- orbit dots -->
    <g transform="translate(600,210)">
      <g>
        <circle cx="110" cy="0" r="3" fill="#f59e0b"/>
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="12s" repeatCount="indefinite"/>
      </g>
      <g>
        <circle cx="130" cy="0" r="2" fill="#f59e0b" opacity="0.6"/>
        <animateTransform attributeName="transform" type="rotate" from="180" to="540" dur="16s" repeatCount="indefinite"/>
      </g>
    </g>
  </g>

  <!-- flow path: hub -> plugins -->
  <path id="flow-right-top" d="M 680 180 Q 800 130 920 130" class="flow-path"/>
  <path id="flow-right-bot" d="M 680 240 Q 800 290 920 290" class="flow-path"/>
  <circle r="4" fill="#f59e0b">
    <animateMotion dur="2.2s" repeatCount="indefinite" path="M 680 180 Q 800 130 920 130"/>
  </circle>
  <circle r="3" fill="#f59e0b" opacity="0.6">
    <animateMotion dur="2.2s" begin="1.1s" repeatCount="indefinite" path="M 680 180 Q 800 130 920 130"/>
  </circle>
  <circle r="4" fill="#f59e0b">
    <animateMotion dur="2.2s" begin="0.6s" repeatCount="indefinite" path="M 680 240 Q 800 290 920 290"/>
  </circle>
  <circle r="3" fill="#f59e0b" opacity="0.6">
    <animateMotion dur="2.2s" begin="1.7s" repeatCount="indefinite" path="M 680 240 Q 800 290 920 290"/>
  </circle>

  <!-- RIGHT TOP: sniff -->
  <g class="node-card">
    <rect x="920" y="74" width="220" height="112" rx="14" class="node-bg node-stroke"/>
    <text x="940" y="102" class="sub">PLUGIN · 01</text>
    <text x="940" y="128" class="title">sniff</text>
    <text x="940" y="150" class="sub">QA scanner</text>
    <g transform="translate(940,160)">
      <rect x="0" y="0" width="50" height="18" rx="4" fill="#ef4444" fill-opacity="0.15" stroke="#ef4444" stroke-opacity="0.5"/>
      <text x="25" y="13" text-anchor="middle" font-family="Menlo,monospace" font-size="9" fill="#ef4444" font-weight="600">BUGS</text>
      <rect x="56" y="0" width="50" height="18" rx="4" fill="#f59e0b" fill-opacity="0.15" stroke="#f59e0b" stroke-opacity="0.5"/>
      <text x="81" y="13" text-anchor="middle" font-family="Menlo,monospace" font-size="9" fill="#f59e0b" font-weight="600">A11Y</text>
      <rect x="112" y="0" width="50" height="18" rx="4" fill="#10b981" fill-opacity="0.15" stroke="#10b981" stroke-opacity="0.5"/>
      <text x="137" y="13" text-anchor="middle" font-family="Menlo,monospace" font-size="9" fill="#10b981" font-weight="600">PERF</text>
    </g>
  </g>

  <!-- RIGHT BOTTOM: ui-ux-suite -->
  <g class="node-card">
    <rect x="920" y="234" width="220" height="112" rx="14" class="node-bg node-stroke"/>
    <text x="940" y="262" class="sub">PLUGIN · 02</text>
    <text x="940" y="288" class="title">ui-ux-suite</text>
    <text x="940" y="310" class="sub">Design audit</text>
    <g transform="translate(940,320)">
      <rect x="0" y="0" width="70" height="18" rx="4" fill="#0ea5e9" fill-opacity="0.15" stroke="#0ea5e9" stroke-opacity="0.5"/>
      <text x="35" y="13" text-anchor="middle" font-family="Menlo,monospace" font-size="9" fill="#0ea5e9" font-weight="600">12 DIMS</text>
      <rect x="76" y="0" width="52" height="18" rx="4" fill="#8b5cf6" fill-opacity="0.15" stroke="#8b5cf6" stroke-opacity="0.5"/>
      <text x="102" y="13" text-anchor="middle" font-family="Menlo,monospace" font-size="9" fill="#8b5cf6" font-weight="600">WCAG</text>
      <rect x="134" y="0" width="52" height="18" rx="4" fill="#ec4899" fill-opacity="0.15" stroke="#ec4899" stroke-opacity="0.5"/>
      <text x="160" y="13" text-anchor="middle" font-family="Menlo,monospace" font-size="9" fill="#ec4899" font-weight="600">APCA</text>
    </g>
  </g>

  <!-- bottom caption -->
  <text x="600" y="395" text-anchor="middle" class="sub">one install command · zero config · dual mode (plugin + mcp)</text>
</svg>
