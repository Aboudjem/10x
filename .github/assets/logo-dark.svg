<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" fill="none">
  <style>
    @keyframes sparkle {
      0%,100% { opacity: 0; transform: scale(0.3) rotate(0deg); }
      50% { opacity: 1; transform: scale(1.1) rotate(180deg); }
    }
    @keyframes sparkle-fast {
      0%,100% { opacity: 0; transform: scale(0.2) rotate(0deg); }
      40% { opacity: 1; transform: scale(1) rotate(-180deg); }
      70% { opacity: 0; transform: scale(0.4) rotate(-360deg); }
    }
    @keyframes halo-pulse {
      0%,100% { opacity: 0.2; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(1.08); }
    }
    @keyframes halo-pulse-2 {
      0%,100% { opacity: 0.1; transform: scale(1.15); }
      50% { opacity: 0.28; transform: scale(1.3); }
    }
    @keyframes divider-pulse {
      0%,100% { opacity: 0.35; transform: scaleY(0.7); }
      50% { opacity: 1; transform: scaleY(1); }
    }
    @keyframes bg-glow {
      0%,100% { opacity: 0.04; }
      50% { opacity: 0.1; }
    }
    @keyframes underline-sweep {
      0%,100% { transform: scaleX(0); transform-origin: left; }
      40% { transform: scaleX(1); transform-origin: left; }
      60% { transform: scaleX(1); transform-origin: right; }
      100% { transform: scaleX(0); transform-origin: right; }
    }
    @keyframes eyebrow-fade {
      0%,100% { opacity: 0.7; letter-spacing: 3px; }
      50% { opacity: 1; letter-spacing: 3.5px; }
    }
    @keyframes pill-glint {
      0%,100% { transform: translateX(-120%); }
      50% { transform: translateX(120%); }
    }
    @keyframes chevron-tick {
      0%,100% { transform: translateX(0); opacity: 0.7; }
      50% { transform: translateX(3px); opacity: 1; }
    }
    @keyframes ring-rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes ring-rotate-reverse {
      from { transform: rotate(360deg); }
      to { transform: rotate(0deg); }
    }
    @keyframes text-glow {
      0%,100% { filter: drop-shadow(0 0 8px rgba(251, 191, 36, 0.4)); }
      50% { filter: drop-shadow(0 0 18px rgba(251, 191, 36, 0.8)); }
    }
    @keyframes particle-drift-1 {
      0% { transform: translate(0, 0); opacity: 0; }
      10% { opacity: 0.7; }
      90% { opacity: 0.3; }
      100% { transform: translate(20px, -100px); opacity: 0; }
    }
    @keyframes particle-drift-2 {
      0% { transform: translate(0, 0); opacity: 0; }
      10% { opacity: 0.6; }
      90% { opacity: 0.2; }
      100% { transform: translate(-15px, -90px); opacity: 0; }
    }
    .sparkle-1 { animation: sparkle 2.8s ease-in-out infinite; transform-origin: center; transform-box: fill-box; }
    .sparkle-2 { animation: sparkle-fast 2.5s ease-in-out infinite 1.2s; transform-origin: center; transform-box: fill-box; }
    .sparkle-3 { animation: sparkle 3.2s ease-in-out infinite 0.6s; transform-origin: center; transform-box: fill-box; }
    .sparkle-4 { animation: sparkle-fast 2.3s ease-in-out infinite 1.8s; transform-origin: center; transform-box: fill-box; }
    .sparkle-5 { animation: sparkle 3s ease-in-out infinite 2s; transform-origin: center; transform-box: fill-box; }
    .sparkle-6 { animation: sparkle-fast 2.7s ease-in-out infinite 0.3s; transform-origin: center; transform-box: fill-box; }
    .halo-1 { animation: halo-pulse 3s ease-in-out infinite; transform-origin: center; transform-box: fill-box; }
    .halo-2 { animation: halo-pulse-2 3s ease-in-out infinite 0.8s; transform-origin: center; transform-box: fill-box; }
    .divider { animation: divider-pulse 2.5s ease-in-out infinite; transform-origin: center; transform-box: fill-box; }
    .bg-glow { animation: bg-glow 5s ease-in-out infinite; }
    .underline { animation: underline-sweep 4s ease-in-out infinite; transform-origin: left; }
    .eyebrow { animation: eyebrow-fade 3s ease-in-out infinite; }
    .pill-glint-rect { animation: pill-glint 4s ease-in-out infinite; }
    .chevron { animation: chevron-tick 1.5s ease-in-out infinite; }
    .ring-outer { animation: ring-rotate 25s linear infinite; transform-origin: 160px 100px; transform-box: fill-box; }
    .ring-inner { animation: ring-rotate-reverse 18s linear infinite; transform-origin: 160px 100px; transform-box: fill-box; }
    .ten-x-text { animation: text-glow 3s ease-in-out infinite; }
    .particle-1 { animation: particle-drift-1 6s ease-in-out infinite; }
    .particle-2 { animation: particle-drift-2 7s ease-in-out infinite 1s; }
    .particle-3 { animation: particle-drift-1 5.5s ease-in-out infinite 2.5s; }
    .particle-4 { animation: particle-drift-2 6.5s ease-in-out infinite 3s; }
  </style>
  <defs>
    <linearGradient id="goldMainDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fde68a">
        <animate attributeName="stop-color" values="#fde68a;#fbbf24;#fde68a" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#fbbf24">
        <animate attributeName="stop-color" values="#fbbf24;#fde68a;#fbbf24" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#f59e0b">
        <animate attributeName="stop-color" values="#f59e0b;#d97706;#f59e0b" dur="4s" repeatCount="indefinite"/>
      </stop>
      <animateTransform attributeName="gradientTransform" type="translate" values="0,0; 100,100; 0,0" dur="6s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="goldAccentDark" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0"/>
      <stop offset="50%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="pillGlintDark" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fde68a" stop-opacity="0"/>
      <stop offset="50%" stop-color="#fde68a" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#fde68a" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="haloDark" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#f59e0b" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlowDark" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="pillClipDark">
      <rect x="0" y="0" width="112" height="20" rx="10"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect x="10" y="20" width="700" height="160" rx="24" fill="#0a0a0f" stroke="#f59e0b" stroke-width="1.5" stroke-opacity="0.35"/>
  <rect class="bg-glow" x="10" y="20" width="700" height="160" rx="24" fill="#fbbf24"/>

  <!-- Floating background particles -->
  <g opacity="0.6">
    <circle class="particle-1" cx="180" cy="170" r="1.5" fill="#fbbf24"/>
    <circle class="particle-2" cx="100" cy="175" r="1" fill="#fde68a"/>
    <circle class="particle-3" cx="220" cy="170" r="1.2" fill="#f59e0b"/>
    <circle class="particle-4" cx="60" cy="175" r="1" fill="#fbbf24"/>
  </g>

  <!-- Top and bottom gold accent lines -->
  <line x1="40" y1="42" x2="680" y2="42" stroke="url(#goldAccentDark)" stroke-width="1" opacity="0.5"/>
  <line x1="40" y1="158" x2="680" y2="158" stroke="url(#goldAccentDark)" stroke-width="1" opacity="0.5"/>

  <!-- Halo behind 10x -->
  <ellipse class="halo-2" cx="160" cy="100" rx="130" ry="75" fill="url(#haloDark)"/>
  <ellipse class="halo-1" cx="160" cy="100" rx="100" ry="58" fill="url(#haloDark)"/>

  <!-- Counter-rotating decorative rings -->
  <g class="ring-outer" opacity="0.3">
    <circle cx="160" cy="100" r="82" fill="none" stroke="#fbbf24" stroke-width="0.8" stroke-dasharray="2 8"/>
    <circle cx="242" cy="100" r="2" fill="#fbbf24"/>
    <circle cx="78" cy="100" r="1.5" fill="#fde68a"/>
  </g>
  <g class="ring-inner" opacity="0.35">
    <circle cx="160" cy="100" r="68" fill="none" stroke="#f59e0b" stroke-width="0.6" stroke-dasharray="3 6"/>
    <circle cx="160" cy="32" r="1.8" fill="#f59e0b"/>
    <circle cx="160" cy="168" r="1.5" fill="#fbbf24"/>
  </g>

  <!-- Massive "10x" mark -->
  <g filter="url(#softGlowDark)" class="ten-x-text">
    <text x="60" y="140" font-family="'SF Pro Display', 'Inter', system-ui, -apple-system, sans-serif" font-size="120" font-weight="900" fill="url(#goldMainDark)" letter-spacing="-6">10<tspan font-style="italic">x</tspan></text>
  </g>

  <!-- Sparkles scattered around the 10x -->
  <g class="sparkle-1" transform="translate(245, 68)">
    <path d="M0,-7 L1.5,-1.5 L7,0 L1.5,1.5 L0,7 L-1.5,1.5 L-7,0 L-1.5,-1.5 Z" fill="#fde68a"/>
  </g>
  <g class="sparkle-2" transform="translate(270, 125)">
    <path d="M0,-5 L1,-1 L5,0 L1,1 L0,5 L-1,1 L-5,0 L-1,-1 Z" fill="#fbbf24"/>
  </g>
  <g class="sparkle-3" transform="translate(50, 55)">
    <path d="M0,-4 L1,-1 L4,0 L1,1 L0,4 L-1,1 L-4,0 L-1,-1 Z" fill="#fde68a"/>
  </g>
  <g class="sparkle-4" transform="translate(85, 160)">
    <path d="M0,-5 L1.2,-1.2 L5,0 L1.2,1.2 L0,5 L-1.2,1.2 L-5,0 L-1.2,-1.2 Z" fill="#f59e0b"/>
  </g>
  <g class="sparkle-5" transform="translate(230, 165)">
    <path d="M0,-6 L1.4,-1.4 L6,0 L1.4,1.4 L0,6 L-1.4,1.4 L-6,0 L-1.4,-1.4 Z" fill="#fbbf24"/>
  </g>
  <g class="sparkle-6" transform="translate(35, 110)">
    <path d="M0,-4 L1,-1 L4,0 L1,1 L0,4 L-1,1 L-4,0 L-1,-1 Z" fill="#fde68a"/>
  </g>

  <!-- Vertical divider -->
  <line class="divider" x1="305" y1="55" x2="305" y2="145" stroke="#fbbf24" stroke-width="2" stroke-linecap="round" opacity="0.6"/>

  <!-- Right side text stack -->
  <!-- Eyebrow label -->
  <text class="eyebrow" x="330" y="72" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="700" fill="#fbbf24" letter-spacing="3">DEVELOPER TOOLS</text>

  <!-- Main title -->
  <text x="330" y="105" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="800" fill="#fafafa" letter-spacing="-0.8">Curated plugins that ship quality</text>

  <!-- Animated underline under title -->
  <rect class="underline" x="330" y="112" width="310" height="2" rx="1" fill="#fbbf24" opacity="0.8"/>

  <!-- Supporting tagline -->
  <g>
    <text x="330" y="134" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#94a3b8" letter-spacing="0.3">Battle-tested · Zero bloat · Built for speed</text>
  </g>

  <!-- Claude Code badge with glint animation -->
  <g transform="translate(330, 148)">
    <rect x="0" y="0" width="112" height="20" rx="10" fill="#fbbf24" fill-opacity="0.15" stroke="#fbbf24" stroke-width="0.5" stroke-opacity="0.5"/>
    <g clip-path="url(#pillClipDark)">
      <rect class="pill-glint-rect" x="0" y="0" width="40" height="20" fill="url(#pillGlintDark)" opacity="0.7"/>
    </g>
    <circle cx="12" cy="10" r="3" fill="#fbbf24" opacity="0.9">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="62" y="14" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="700" fill="#fde68a" letter-spacing="0.5" text-anchor="middle">CLAUDE CODE</text>
    <text class="chevron" x="100" y="14" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="700" fill="#fde68a">›</text>
  </g>
</svg>
